<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}} — DirPlayer</title>
<style>{{CSS}}</style>
</head>
<body>
<header class="page-header">
  <div class="dirplayer">
    {{LOGO}}
    <span class="dirplayer-name">DirPlayer</span>
  </div>
  {{NAV}}
  <h1>{{TITLE}}</h1>
  <div class="summary">
    <span class="stat pass">{{PASS_COUNT}} passed</span>

    <span class="dot">·</span>
    <span class="stat total">{{TOTAL_COUNT}} total</span>
  </div>
  {{FILTER}}
</header>
<main>
{{BODY}}
</main>
<script>{{JS}}</script>
</body>
</html>
