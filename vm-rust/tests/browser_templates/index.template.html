<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>dirplayer browser tests</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: monospace; margin: 0; padding: 16px; background: #1a1a1a; color: #eee; height: 100vh; overflow: hidden; display: flex; flex-direction: column; gap: 8px; }
    #layout { display: flex; flex-direction: column; gap: 8px; flex: 1; overflow: hidden; }
    #stage_canvas_container { background: #000; display: inline-block; flex-shrink: 0; align-self: flex-start; }
    #stage_canvas_container canvas { display: block; }
    #output { background: #222; border-radius: 4px; flex: 1; overflow-y: auto; margin: 0; padding: 0 0 4px; }
    #output .status-line { padding: 3px 8px; color: #aaa; white-space: pre-wrap; }
    #output summary { padding: 3px 8px; cursor: pointer; user-select: none; list-style: none; outline: none; display: flex; align-items: center; gap: 6px; position: sticky; top: 0; background: #222; z-index: 1; border-top: 1px solid #2a2a2a; }
    #output summary::-webkit-details-marker { display: none; }
    #output summary .summary-name { flex: 1; }
    #output summary.running { color: #888; }
    #output summary.pass { color: #4caf50; }
    #output summary.fail { color: #f44336; }
    #output .test-log { padding: 2px 8px 4px 20px; color: #666; }
    #output .test-log div { white-space: pre-wrap; line-height: 1.4; }
    #output .test-error { padding: 2px 8px 4px 20px; color: #c0392b; white-space: pre-wrap; }
    #output .rerun-btn { padding: 0 4px; background: none; border: none; color: #888; cursor: pointer; flex-shrink: 0; font-size: 1.3em; line-height: 1; border-radius: 3px; }
    #output .rerun-btn:hover { color: #eee; background: #333; }
  </style>
  <script>
    window.__dirplayerTestMode = true;
    window._audioContext = null;
    window.getAudioContext = function() {
      if (!window._audioContext) window._audioContext = new AudioContext();
      return window._audioContext;
    };
    window.__scriptErrors = [];
    window.__onScriptError = function(msg) {
      window.__scriptErrors.push(msg);
    };
    window.__saveSnapshot = function(suite, name, base64png, maxDiffRatio) {
      if (window.__playwrightSaveSnapshot) {
        window.__playwrightSaveSnapshot(suite, name, base64png, maxDiffRatio || 0);
      }
    };
    window.__currentTestLog = null;
    window.__testLog = function(msg) {
      var log = window.__currentTestLog;
      if (log) {
        var line = document.createElement('div');
        line.textContent = msg;
        log.appendChild(line);
      }
      var out = document.getElementById('output');
      if (out) out.scrollTop = out.scrollHeight;
    };
    window.__testLogLive = function(id, msg) {
      var log = window.__currentTestLog;
      if (log) {
        var line = document.createElement('div');
        line.id = '__tlog_' + id;
        line.textContent = msg + '...';
        log.appendChild(line);
      }
      var out = document.getElementById('output');
      if (out) out.scrollTop = out.scrollHeight;
    };
    window.__testLogUpdate = function(id, msg) {
      var line = document.getElementById('__tlog_' + id);
      if (line) line.textContent = msg;
      var out = document.getElementById('output');
      if (out) out.scrollTop = out.scrollHeight;
    };
    window.__testResults = null;
    window.__testEnv = $TEST_ENV_JSON;
    window.__testDebug = $DEBUG_MODE;

    // Ruffle + DirPlayer Flash bridge — mirrors public/index.html setup.
    // dirplayer-rs ships a fork of Ruffle namespaced under
    // window.dirplayer_RufflePlayer (and the loader is renamed to
    // dirplayer_ruffle.js) so the fork's globals don't collide with stock
    // Ruffle if both are loaded on the same page.
    window.dirplayer_RufflePlayer = window.dirplayer_RufflePlayer || {};
    window.dirplayer_RufflePlayer.config = { allowNetworking: "all" };
    window.__dirplayerFlashConfig = { renderer: "canvas", logLevel: "warn" };
  </script>
  <script src="./ruffle/dirplayer_ruffle.js"></script>
  <script type="importmap">
  {
    "imports": {
      "dirplayer-js-api": "./dirplayer-js-api.js",
      "vm-rust": "./$WASM_JS_FILE"
    }
  }
  </script>
</head>
<body>
  <div id="layout">
    <div id="stage_canvas_container"></div>
    <div id="output"></div>
  </div>
  <script type="module">
    import init, * as wasm from './$WASM_JS_FILE';
    const output = document.getElementById('output');

    function statusLine(msg) {
      const el = document.createElement('div');
      el.className = 'status-line';
      el.textContent = msg;
      output.appendChild(el);
      output.scrollTop = output.scrollHeight;
      console.log(msg);
    }

    function startTest(name) {
      const details = document.createElement('details');
      details.open = true;
      const summary = document.createElement('summary');
      summary.className = 'running';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'summary-name';
      nameSpan.textContent = '▶ ' + name;
      summary.appendChild(nameSpan);
      const logDiv = document.createElement('div');
      logDiv.className = 'test-log';
      details.appendChild(summary);
      details.appendChild(logDiv);
      output.appendChild(details);
      output.scrollTop = output.scrollHeight;
      window.__currentTestLog = logDiv;
      return { details, summary, nameSpan, logDiv };
    }

    function endTest(group, name, pass, error) {
      window.__currentTestLog = null;
      group.nameSpan.textContent = (pass ? '✓ ' : '✗ ') + name;
      group.summary.className = pass ? 'pass' : 'fail';
      if (!pass) {
        const errEl = document.createElement('div');
        errEl.className = 'test-error';
        errEl.textContent = error;
        group.logDiv.appendChild(errEl);
      } else {
        group.details.open = false;
      }
      if (window.__testDebug) {
        const btn = document.createElement('button');
        btn.className = 'rerun-btn';
        btn.title = 're-run';
        btn.textContent = '↺';
        btn.onclick = (e) => { e.stopPropagation(); runTest(name); };
        group.summary.appendChild(btn);
      }
      output.scrollTop = output.scrollHeight;
      console.log((pass ? '✓ ' : '✗ ') + name + (error ? ': ' + error : ''));
    }

    async function runTest(name) {
      const group = startTest(name);
      try {
        await wasm[name]();
        endTest(group, name, true);
      } catch (e) {
        const panicMsg = window.__testPanic;
        const error = panicMsg || e.message || String(e);
        window.__testPanic = undefined;
        endTest(group, name, false, error);
      }
    }

    const results = { tests: [], passed: 0, failed: 0, done: false };

    try {
      await init();
      // Wire up timeout triggering now that wasm exports are available
      window.__wasm_trigger_timeout = wasm.trigger_timeout;
      statusLine('Module loaded. Running tests...');

      const testFns = Object.keys(wasm)
        .filter(k => k.startsWith('test_') && typeof wasm[k] === 'function');

      for (const name of testFns) {
        const group = startTest(name);
        try {
          await wasm[name]();
          results.tests.push({ name, status: 'pass' });
          results.passed++;
          endTest(group, name, true);
        } catch (e) {
          // Check for a Rust panic message (set by our panic hook)
          const panicMsg = window.__testPanic;
          const error = panicMsg || e.message || String(e);
          window.__testPanic = undefined;
          results.tests.push({ name, status: 'fail', error });
          results.failed++;
          endTest(group, name, false, error);
        }
      }
    } catch (e) {
      results.tests.push({ name: '__init', status: 'fail', error: e.message });
      results.failed++;
      statusLine('ERROR: ' + e.message + '\n' + e.stack);
    }

    results.done = true;
    window.__testResults = results;
    statusLine('');
    statusLine(results.failed === 0
      ? results.passed + ' passed'
      : results.failed + ' failed, ' + results.passed + ' passed');
  </script>
</body>
</html>
