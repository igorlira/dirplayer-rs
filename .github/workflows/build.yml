name: DirPlayer Master Release Pipeline (All Architectures)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

permissions:
  contents: write
  statuses: write

jobs:
  # MASTER BUILD & MULTI-ARCH PACKAGING
  build-and-release:
    name: Build & Package (${{ matrix.os-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            # Baut Windows x64, x86 (ia32) und ARM64
            build-args: --win --x64 --ia32 --arm64
            binaryen-url: https://github.com/WebAssembly/binaryen/releases/download/version_116/binaryen-version_116-x86_64-windows.tar.gz
          - os: macos-latest
            os-name: macOS
            # Erstellt eine Universal-App, die sowohl x64 als auch arm64 nativ unterstützt
            build-args: --mac universal
            binaryen-url: https://github.com/WebAssembly/binaryen/releases/download/version_116/binaryen-version_116-x86_64-macos.tar.gz
          - os: ubuntu-latest
            os-name: Linux
            # Baut Linux AppImage und DEB für x64 und ARM64
            build-args: --linux AppImage deb --x64 --arm64
            binaryen-url: https://github.com/WebAssembly/binaryen/releases/download/version_116/binaryen-version_116-x86_64-linux.tar.gz

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install `wasm-pack`
        run: cargo install wasm-pack
        shell: bash

      - name: Install Ruffle Wasm Compiler Prerequisites
        run: |
          cargo install wasm-bindgen-cli --version 0.2.108
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Native Wasm Optimizer (Binaryen)
        run: |
          curl -L "${{ matrix.binaryen-url }}" -o binaryen.tar.gz
          tar -xzf binaryen.tar.gz
          cd binaryen-version_116/bin
          echo "$(pwd)" >> $GITHUB_PATH
        shell: bash

      - name: Install Linux Extras
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools
        shell: bash

      - name: Install NPM Dependencies
        run: npm ci
        shell: bash

      - name: Run Complete Master Build
        run: npm run build-all
        shell: bash
        env:
          CI: false

      # Baut alle spezifizierten CPU-Architekturen
      - name: Package Electron App binaries
        run: npx electron-builder ${{ matrix.build-args }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Lädt alle generierten Architekturen in den Release-Entwurf hoch
      - name: Create Multi-OS Release Draft
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.6.0-master-build
          name: "DirPlayer v0.6.0 Master Release"
          draft: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
