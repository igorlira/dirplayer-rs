name: DirPlayer Master Pipeline (All-In-One)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Set to "true" to update and push E2E visual snapshots'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  # ==========================================
  # 1. AUTOMATIC PATH LABELER (From File #5)
  # ==========================================
  label-pr:
    name: Label Pull Request
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
    steps:
      - name: Labeler
        uses: actions/labeler@v5

  # ==========================================
  # 2. MASTER BUILD, TEST & OS PACKAGING
  # ==========================================
  build-test-release:
    name: Build & Package (${{ matrix.os-name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Bulletproof: one OS failure won't kill the others
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            build-args: --win
          - os: macos-latest
            os-name: macOS
            build-args: --mac
          - os: ubuntu-latest
            os-name: Linux
            build-args: --linux AppImage deb

    env:
      CARGO_TERM_COLOR: always
      TEST_ASSETS_URL: ${{ secrets.TEST_ASSETS_URL }}
      HABBO_V7_USERNAME: ${{ secrets.HABBO_V7_USERNAME }}
      HABBO_V7_PASSWORD: ${{ secrets.HABBO_V7_PASSWORD }}
      HABBO_V7_INFO_HOST: ${{ secrets.HABBO_V7_INFO_HOST }}
      HABBO_V7_INFO_PORT: ${{ secrets.HABBO_V7_INFO_PORT }}
      HABBO_V26_SSO_TICKET: ${{ secrets.HABBO_V26_SSO_TICKET }}
      HABBO_V31_SSO_TICKET: ${{ secrets.HABBO_V31_SSO_TICKET }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install `wasm-pack`
        run: cargo install wasm-pack

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # System dependencies for Linux packaging & headless image rendering
      - name: Install Linux System Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools ttf-mscorefonts-installer imagemagick
          sudo fc-cache -fv

      - name: Install NPM Dependencies
        run: npm ci

      # Reliable self-contained wasm-opt fix for Ruffle core compilation
      - name: Install `wasm-opt` globally
        run: npm install -g wasm-opt

      - name: Install Playwright Chromium (For E2E Testing)
        run: npx playwright install --with-deps chromium

      - name: Download Remote Test Assets
        run: |
          if [ -z "$TEST_ASSETS_URL" ]; then echo "Skipping assets: URL secret missing"; exit 0; fi
          curl -fSL "$TEST_ASSETS_URL" -o assets.zip
          unzip -qo assets.zip -d public/

      # Core Rust Engine Tests (From File #2)
      - name: Run Core Rust Unit Tests
        working-directory: ./vm-rust
        run: |
          cargo fetch
          cargo test --verbose -- --skip e2e

      # Master Build Sequence (From package.json)
      - name: Run Complete Master Build (Rust VM, Ruffle, Frontend)
        run: npm run build-all

      # End-to-End Visual Validation (From File #1)
      - name: Run Native E2E Tests
        continue-on-error: true
        run: npm run e2e-test-native

      - name: Run Browser E2E Tests
        continue-on-error: true
        run: npm run e2e-test-browser

      # OPTIONAL SNAPSHOT UPDATE LAYER (From File #3)
      - name: Update Visual Snapshots (Manual trigger only)
        if: github.event.inputs.update_snapshots == 'true' && matrix.os == 'ubuntu-latest'
        run: |
          npm run e2e-update-native
          npm run e2e-update-browser
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/snapshots/
          git commit -m "chore: auto-update e2e snapshots [skip ci]" || echo "No snapshot changes to commit"
          git push

      # Native Electron Packaging (From package.json)
      - name: Package Electron App binaries
        run: npx electron-builder ${{ matrix.build-args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Automatic Release Handling
      - name: Create Multi-OS Release Draft
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.6.0-master-build
          name: "DirPlayer v0.6.0 Master Release"
          draft: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
